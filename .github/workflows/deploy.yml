name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 72.60.226.147 >> ~/.ssh/known_hosts

      - name: Build & Deploy on VPS
        run: |
          ssh -i ~/.ssh/deploy_key root@72.60.226.147 "
            set -e
            cd /tmp && rm -rf finanzas-build
            git clone https://github.com/properties714/properties714-finanzas finanzas-build
            cd finanzas-build
            docker build -t easypanel/adminzeus/finanzas:latest .
            docker service update --image easypanel/adminzeus/finanzas:latest adminzeus_finanzas
            docker service update --force --env-add DEPLOY_TIMESTAMP=\$(date +%s) adminzeus_finanzas
            echo 'Deploy complete'
          "
